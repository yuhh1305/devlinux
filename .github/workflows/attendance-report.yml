name: Generate Attendance Report

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  generate-report:
    name: Generate Homework Attendance Reports
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      # Checkout the public devlinux repo
      - name: Checkout devlinux repo
        uses: actions/checkout@v4
        with:
          path: devlinux

      # Setup SSH to clone private reviewer repo
      - name: Setup SSH Deploy Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.REVIEWER_DEPLOY_KEY }}

      # Clone private reviewer repo containing the script
      - name: Checkout private reviewer repo
        run: git clone git@github.com:${{ secrets.REVIEWER_REPO }} reviewer-core

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: pip install requests --break-system-packages

      # Run the attendance report generator
      - name: Generate attendance reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REPO: ${{ github.repository }}
        run: python reviewer-core/scripts/generate_attendance_report.py

      # Move reports to correct location
      - name: Move reports to correct location
        run: |
          find devlinux/devlinux -name "homework_report.csv" -type f 2>/dev/null | while read file; do
            dir=$(dirname "$file" | sed 's|devlinux/||')
            mkdir -p "devlinux/$dir"
            mv "$file" "devlinux/$dir/"
          done

      # Configure git
      - name: Configure git
        run: |
          cd devlinux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Commit and push reports
      - name: Commit and push reports
        run: |
          cd devlinux
          if git diff --quiet; then
            echo "✅ No changes to reports"
          else
            git add "**/homework_report.csv"
            git commit -m "📊 Update attendance report - $(date +'%Y-%m-%d')"
            git push origin master
            echo "✅ Reports pushed to GitHub"
          fi
